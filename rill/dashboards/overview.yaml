type: explore
title: Monobank — Аналитика
metrics_view: spending

dimensions:
  - time
  - account_name
  - category
  - merchant
  - description
  - tx_type
  - currency
  - hold
  - comment
  - month
  - day_of_week

measures:
  - total_spent
  - total_income
  - net
  - tx_count
  - avg_check
  - max_expense
  - total_cashback

defaults:
  time_range: P1M
  measures:
    - total_spent
    - total_income
    - net
    - tx_count
